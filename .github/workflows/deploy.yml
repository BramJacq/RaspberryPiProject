name: Build and Deploy to Raspberry Pi

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- QEMU ARM emulation (nodig voor ARM Docker builds) ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      # --- Enable Docker Buildx (nodig voor cross-compile) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build ARM Docker image ---
      - name: Build ARM image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t bramj \
            --load .

      # --- Compile inside ARM container ---
      - name: Compile C program
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            bramj \
            bash -c "cd /work && gcc main.c -o main"

      # --- Add Raspberry Pi to known hosts ---
      - name: Add Pi to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H TimoBramRaspberry.local >> ~/.ssh/known_hosts

      # --- Copy binary to Raspberry Pi ---
      - name: Upload main to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: TimoBramRaspberry.local
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          source: "main"
          target: "/home/bramtimo/"

      # --- Run main on Raspberry Pi ---
      - name: Start program on Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: TimoBramRaspberry.local
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          script: |
            chmod +x /home/bramtimo/main
            pkill main || true
            /home/bramtimo/main &
