name: Build and Deploy to Raspberry Pi

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- Repo binnenhalen ---
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- Docker ARM build ---
      - name: Build Docker image (ARM)
        run: docker build -t bramj --platform=linux/ARM .

      # --- Compile inside container ---
      - name: Compile code inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            bramj \
            bash -c "cd /work && make || gcc main.c -o main"

      # --- Add Pi to known_hosts (nodig voor SSH/SCP) ---
      - name: Add Pi to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H TimoBramRaspberry.local >> ~/.ssh/known_hosts

      # --- Copy main naar de Raspberry ---
      - name: Upload binary via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: TimoBramRaspberry.local
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          source: "main"
          target: "/home/bramtimo/"

      # --- Run main op de Raspberry Pi ---
      - name: SSH run main
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: TimoBramRaspberry.local
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          script: |
            chmod +x /home/bramtimo/main
            pkill main || true
            /home/bramtimo/main &
