name: Deploy to Raspberry Pi

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- Add Raspberry Pi to known_hosts ---
      - name: Add Pi to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 192.168.3.190 >> ~/.ssh/known_hosts

      # --- Copy all source files to Raspberry Pi ---
      - name: Upload project to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 192.168.3.190
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          source: "."
          target: "/home/bramtimo/project/"

      # --- Build & Run main on the Pi ---
      - name: Build and run on Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.3.190
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          script: |
            cd /home/bramtimo/project
            gcc main.c pigpio.o -o main
            chmod +x main
            pkill main || true
            ./main &

