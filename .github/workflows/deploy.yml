name: Deploy to Raspberry Pi

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # --- Checkout repository ---
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- Add Pi to known_hosts ---
      - name: Add Pi to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 192.168.3.190 >> ~/.ssh/known_hosts

      # --- Copy all necessary files to Raspberry Pi ---
      - name: Upload project to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 192.168.3.190
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          source: "."
          target: "/home/bramtimo/project/"

      # --- Compile and run on the Raspberry Pi ---
      - name: Compile and run main on Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.3.190
          username: bramtimo
          password: ${{ secrets.PI_PASSWORD }}
          script: |
            cd /home/bramtimo/project
            gcc main.c libpigpio.a -lrt -pthread -o main
            chmod +x main
            tmux kill-session -t myapp || true
            tmux new -d -s myapp "./main"
